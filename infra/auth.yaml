AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Flight Record App - Auth layer.
  Cognito User Pool + SPA client (PKCE auth code flow). Standalone stack.
  Note: Cognito user pools cannot migrate users between instances; this template
  creates a new pool. Existing users in the live pool are not affected.

Parameters:

  ResourcePrefix:
    Type: String
    Default: flight-record-iac
    AllowedPattern: '[a-z][a-z0-9-]{2,40}'

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

  CallbackUrl:
    Type: String
    Default: http://localhost:3000/app/
    Description: SPA callback URL after Cognito hosted-UI login. Update after CloudFront stack is deployed.

  LogoutUrl:
    Type: String
    Default: http://localhost:3000/app/

  CognitoDomainPrefix:
    Type: String
    Default: ''
    Description: Optional. Cognito hosted-UI domain prefix (must be globally unique). Leave blank to skip domain creation.

Conditions:

  CreateDomain: !Not [!Equals [!Ref CognitoDomainPrefix, '']]

Resources:

  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: !Sub '${ResourcePrefix}-${Environment}'
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7
      MfaConfiguration: 'OFF'
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UserPoolTags:
        Application: flight-record-app
        Environment: !Ref Environment
        ManagedBy: CloudFormation

  SpaClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${ResourcePrefix}-spa-${Environment}'
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      CallbackURLs:
        - !Ref CallbackUrl
      LogoutURLs:
        - !Ref LogoutUrl
      SupportedIdentityProviders:
        - COGNITO
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      RefreshTokenValidity: 30
      AccessTokenValidity: 60
      IdTokenValidity: 60
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: CreateDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref UserPool

Outputs:

  UserPoolId:
    Value: !Ref UserPool
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolId'

  UserPoolArn:
    Value: !GetAtt UserPool.Arn
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolArn'

  UserPoolClientId:
    Value: !Ref SpaClient
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolClientId'

  UserPoolDomain:
    Condition: CreateDomain
    Value: !Sub 'https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolDomain'
